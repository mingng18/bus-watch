name: BusWatch
options:
  bundleIdPrefix: com.nggihming
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
  configs:
    Release:
      VALIDATE_PRODUCT: YES

targets:
  # App Store Connect expects watch-only apps to be packaged inside an iOS
  # watch-app container. This target is a stub wrapper only; no iPhone app UI or
  # executable is installed on users' phones.
  BusWatchContainer:
    type: application.watchapp2-container
    platform: iOS
    sources:
      - BusWatch/Assets.xcassets
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_NAME: BusWatch
        PRODUCT_BUNDLE_IDENTIFIER: com.nggihming.buswatch
        INFOPLIST_KEY_CFBundleDisplayName: BusWatch
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "5"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 25B4MS36A6
    dependencies:
      - target: BusWatch
        embed: true

  BusWatch:
    type: application
    platform: watchOS
    sources:
      - BusWatch
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKWatchOnly: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.nggihming.buswatch.watchkitapp
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 25B4MS36A6
    entitlements:
      path: BusWatch/BusWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.nggihming.buswatch
    info:
      path: BusWatch/Info.plist
      properties:
        CFBundleDisplayName: BusWatch
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "3"
        CFBundleIconName: AppIcon
        ITSAppUsesNonExemptEncryption: false
        WKApplication: true
        WKWatchOnly: true
        NSLocationWhenInUseUsageDescription: "BusWatch needs your location to find nearby bus stops and train stations."
    dependencies:
      - sdk: WatchKit.framework
      - target: BusWatchComplications
        embed: true

  BusWatchComplications:
    type: app-extension
    platform: watchOS
    sources:
      - BusWatchComplications
      # Shared code compiled into both the app and this extension so the
      # widget can read the home stop + cached schedule and resolve the
      # countdown without depending on the full app target.
      - path: BusWatch/Services/SharedDefaults.swift
      - path: BusWatch/Services/ScheduleCache.swift
      - path: BusWatch/Services/CountdownTimeline.swift
      - path: BusWatch/Models/StationSchedule.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nggihming.buswatch.watchkitapp.widget
        INFOPLIST_KEY_CFBundleDisplayName: BusWatch Complications
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 25B4MS36A6
    entitlements:
      path: BusWatchComplications/BusWatchComplications.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.nggihming.buswatch
    info:
      path: BusWatchComplications/Info.plist
      properties:
        CFBundleDisplayName: BusWatch Complications
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "3"
        ITSAppUsesNonExemptEncryption: false
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

  BusWatchTests:
    type: bundle.unit-test
    platform: watchOS
    sources:
      - BusWatchTests
      - path: BusWatchTests/APIClientTests.swift
    dependencies:
      - target: BusWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nggihming.buswatch.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  BusWatch AppStore:
    build:
      targets:
        BusWatchContainer: archive
    archive:
      config: Release
      customArchiveName: BusWatch
      revealArchiveInOrganizer: true

  BusWatchComplications:
    build:
      targets:
        BusWatchComplications: all
