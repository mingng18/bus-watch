name: BusWatch
options:
  bundleIdPrefix: com.buswatch
  deploymentTarget:
    watchOS: "10.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  BusWatch:
    type: application
    platform: watchOS
    sources:
      - BusWatch
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKWatchOnly: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.buswatch.watchapp
    entitlements:
      path: BusWatch/BusWatch.entitlements
      properties:
        com.apple.developer.carekit: NO
    info:
      path: BusWatch/Info.plist
      properties:
        CFBundleDisplayName: BusWatch
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        WKApplication: true
        WKWatchOnly: true
        NSLocationWhenInUseUsageDescription: "BusWatch needs your location to find nearby bus stops and train stations."
    dependencies:
      - sdk: WatchKit.framework

  BusWatchTests:
    type: bundle.unit-test
    platform: watchOS
    sources:
      - BusWatchTests
    dependencies:
      - target: BusWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.buswatch.watchapp.tests
