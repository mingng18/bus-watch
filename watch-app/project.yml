name: BusWatch
options:
  bundleIdPrefix: com.buswatch
  deploymentTarget:
    watchOS: "10.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  BusWatch:
    type: application
    platform: watchOS
    sources:
      - BusWatch
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKWatchOnly: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.buswatch.watchapp
    entitlements:
      path: BusWatch/BusWatch.entitlements
      properties:
        com.apple.developer.carekit: NO
        # App Group for sharing the home stop + cached schedule with the
        # WidgetKit complication extension. Re-enable once the extension
        # target lands and a provisioned group is configured (it currently
        # breaks watchOS Simulator install under CODE_SIGNING_ALLOWED=NO).
        # com.apple.security.application-groups:
        #   - group.com.buswatch.watchapp
    info:
      path: BusWatch/Info.plist
      properties:
        CFBundleDisplayName: BusWatch
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        WKApplication: true
        WKWatchOnly: true
        NSLocationWhenInUseUsageDescription: "BusWatch needs your location to find nearby bus stops and train stations."
    dependencies:
      - sdk: WatchKit.framework
      - target: BusWatchComplications
        embed: true

  BusWatchComplications:
    type: app-extension
    platform: watchOS
    sources:
      - BusWatchComplications
      # Shared code compiled into both the app and this extension so the
      # widget can read the home stop + cached schedule and resolve the
      # countdown without depending on the full app target.
      - path: BusWatch/Services/SharedDefaults.swift
      - path: BusWatch/Services/ScheduleCache.swift
      - path: BusWatch/Services/CountdownTimeline.swift
      - path: BusWatch/Models/StationSchedule.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.buswatch.watchapp.widget
        INFOPLIST_KEY_CFBundleDisplayName: BusWatch Complications
        SKIP_INSTALL: YES
        CODE_SIGNING_ALLOWED: NO
    entitlements:
      path: BusWatchComplications/BusWatchComplications.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.buswatch.watchapp
    info:
      path: BusWatchComplications/Info.plist
      properties:
        CFBundleDisplayName: BusWatch Complications
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

  BusWatchTests:
    type: bundle.unit-test
    platform: watchOS
    sources:
      - BusWatchTests
    dependencies:
      - target: BusWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.buswatch.watchapp.tests

schemes:
  BusWatchComplications:
    build:
      targets:
        BusWatchComplications: all
